# Fly.io Deployment Configuration for Coordinator (Primary)
#
# Service: Coordinator (Primary Instance)
# Region: sjc (San Jose, US-West)
# Purpose: Main coordinator dashboard - orchestrates all partitions and services
#
# @see ADR-003: Partitioned Chain Detectors
# @see ADR-006: Free Hosting Provider Selection
# @see ADR-007: Cross-Region Failover Strategy
#
# Deployment:
#   fly deploy -c infrastructure/fly/coordinator.toml
#
# Notes:
# - Primary coordinator instance (IS_STANDBY=false)
# - Uses Redis-based leader election for failover with standby
# - Exposes port 3000 for dashboard and API access
# - Health check on /api/health (coordinator uses Express with '/api' prefix)

app = "arbitrage-coordinator"
primary_region = "sjc"

[build]
  dockerfile = "services/coordinator/Dockerfile"
  [build.args]
    NODE_ENV = "production"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  REGION_ID = "us-west1"
  LOG_LEVEL = "info"
  ENABLE_CROSS_REGION_HEALTH = "true"
  IS_STANDBY = "false"
  CAN_BECOME_LEADER = "true"
  # P0-1 FIX: Trust Fly.io reverse proxy so express-rate-limit uses X-Forwarded-For.
  # Without this, all clients share one rate-limit bucket (proxy IP = socket IP).
  TRUST_PROXY = "1"
  # P1-6 FIX: Use Redis-backed rate limiting for multi-instance deployment.
  # Without this, each instance has its own in-memory store (N instances = N * limit).
  RATE_LIMIT_STORE = "redis"
  # SM-002/ADR-038: Enable chain-group routing to distribute execution across
  # multiple EE instances. Each EE sets EXECUTION_CHAIN_GROUP={fast|l2|premium|solana}.
  # Without this, single EE throughput bottleneck causes growing consumer lag.
  COORDINATOR_CHAIN_GROUP_ROUTING = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

# NOTE: Using [http_service] and [checks] (Machines V2 syntax)

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# P3-007: [metrics] port=9091 removed — no process listens on 9091.
# Prometheus metrics are served on the health check port at /metrics.

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    port = 3000
    timeout = "5s"
    type = "http"

  [checks.ready]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/api/health/ready"
    port = 3000
    timeout = "5s"
    type = "http"

[processes]
  # RT-3P-001: --max-old-space-size=192 reduces major GC pressure on 256MB VM.
  # Without this, V8 defaults to ~128MB heap, triggering frequent major GCs (15.8% ratio observed).
  app = "node --max-old-space-size=192 dist/index.js"

[deploy]
  release_command = "echo 'Coordinator primary deploying...'"
  strategy = "rolling"

# Secrets to configure (via fly secrets set):
# REDIS_URL - Redis connection URL (self-hosted or Upstash)
