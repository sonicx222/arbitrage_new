# Fly.io Deployment Configuration for High-Value Partition
#
# Partition: high-value
# Chains: Ethereum, zkSync Era, Linea
# Region: iad (Ashburn, US-East)
# Resource Profile: heavy (768MB - Ethereum is memory-intensive)
#
# @see ADR-003: Partitioned Chain Detectors
# @see ADR-006: Free Hosting Provider Selection
# @see ADR-007: Cross-Region Failover Strategy
#
# Deployment:
#   fly deploy -c infrastructure/fly/partition-high-value.toml
#
# Scaling:
#   fly scale memory 768 -c infrastructure/fly/partition-high-value.toml
#
# Notes:
# - Ethereum mainnet requires more memory due to large state and gas estimation
# - zkSync Era uses custom RPC methods for fee estimation
# - Linea shares zkSync-style bridging patterns

app = "arbitrage-high-value"
primary_region = "iad"

[build]
  dockerfile = "services/unified-detector/Dockerfile"
  [build.args]
    NODE_ENV = "production"

[env]
  NODE_ENV = "production"
  PARTITION_ID = "high-value"
  PARTITION_CHAINS = "ethereum,zksync,linea"
  REGION_ID = "us-east1"
  LOG_LEVEL = "info"
  HEALTH_CHECK_PORT = "3003"
  ENABLE_CROSS_REGION_HEALTH = "true"
  # RT-3Q-001 FIX: Explicit memory constraints for 768MB VM.
  CONSTRAINED_MEMORY = "true"
  CACHE_L1_SIZE_MB = "8"
  # Chain-specific RPC URLs set via secrets

[http_service]
  internal_port = 3003
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

# NOTE: Using [http_service] and [checks] (Machines V2 syntax)

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 768

# P3-007: [metrics] port=9091 removed — no process listens on 9091.
# Prometheus metrics are served on the health check port at /metrics.

[checks]
  [checks.health]
    grace_period = "30s"
    # Standardized to 15s interval per ADR-007
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 3003
    timeout = "5s"
    type = "http"

  [checks.ready]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/ready"
    port = 3003
    timeout = "5s"
    type = "http"

# Processes
[processes]
  # M-12 FIX: --max-old-space-size prevents V8 default heap causing OOM on 768MB VM.
  # ~75% of VM memory for heap, matching coordinator pattern (192/256 = 75%).
  app = "node --max-old-space-size=576 dist/index.js"

# Deploy strategy
[deploy]
  release_command = "echo 'High-value partition deploying...'"
  strategy = "rolling"

# Secrets to configure (via fly secrets set):
# REDIS_URL        - Redis connection URL (self-hosted or Upstash)
# ETHEREUM_WS_URL  - Ethereum WebSocket RPC
# ETHEREUM_RPC_URL - Ethereum HTTP RPC (fallback)
# ZKSYNC_WS_URL    - zkSync Era WebSocket RPC
# ZKSYNC_RPC_URL   - zkSync Era HTTP RPC (fallback)
# LINEA_WS_URL     - Linea WebSocket RPC
# LINEA_RPC_URL    - Linea HTTP RPC (fallback)
