name: Deployment Gate

# Phase 0 Item 9: Deployment gate with pre-deploy validation, post-deploy health check, and rollback
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - testnet
          - mainnet
      service:
        description: 'Service to deploy (or "all")'
        required: true
        type: choice
        options:
          - all
          - coordinator
          - partition-asia-fast
          - partition-high-value
          - partition-l2-fast
          - partition-solana
          - execution-engine
          - cross-chain-detector
      dry_run:
        description: 'Dry run (validate only, no deploy)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false  # Never cancel an in-progress deployment

env:
  NODE_ENV: production
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}

jobs:
  # ===========================================================================
  # Phase 1: Pre-Deployment Validation
  # ===========================================================================
  pre-deploy-validate:
    name: Pre-Deploy Validation (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run type check
        run: npm run typecheck

      - name: Run unit tests (critical subset)
        run: npm test -- --selectProjects unit --ci --bail
        env:
          CI: true

      - name: Validate deployment configuration
        run: npm run validate:deployment
        env:
          SIMULATION_MODE: ${{ github.event.inputs.environment == 'testnet' && 'true' || 'false' }}

      - name: Validate MEV setup
        run: npm run validate:mev-setup
        continue-on-error: ${{ github.event.inputs.environment == 'testnet' }}

      - name: Validate router approvals
        run: npm run validate:routers:all
        continue-on-error: ${{ github.event.inputs.environment == 'testnet' }}

      - name: Check contract compilation
        run: cd contracts && npx hardhat compile

      - name: Deployment gate summary
        run: |
          echo "## Pre-Deploy Validation Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ github.event.inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run:** ${{ github.event.inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Phase 2: Deploy to Fly.io (skipped on dry run)
  # ===========================================================================
  deploy:
    name: Deploy ${{ github.event.inputs.service }} to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pre-deploy-validate]
    if: github.event.inputs.dry_run == 'false'
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy service(s)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail

          SERVICE="${{ github.event.inputs.service }}"
          CONFIG_DIR="infrastructure/fly"

          # Map workflow service name to Fly.io TOML config file
          config_for_service() {
            case "$1" in
              coordinator)          echo "$CONFIG_DIR/coordinator.toml" ;;
              partition-asia-fast)  echo "$CONFIG_DIR/partition-asia-fast.toml" ;;
              partition-high-value) echo "$CONFIG_DIR/partition-high-value.toml" ;;
              partition-l2-fast)    echo "$CONFIG_DIR/partition-l2-turbo.toml" ;;
              partition-solana)     echo "$CONFIG_DIR/partition-solana.toml" ;;
              execution-engine)     echo "$CONFIG_DIR/execution-engine.toml" ;;
              cross-chain-detector) echo "$CONFIG_DIR/cross-chain-detector.toml" ;;
              *) echo "::error::Unknown service: $1"; exit 1 ;;
            esac
          }

          deploy_one() {
            local svc="$1"
            local config
            config="$(config_for_service "$svc")"
            echo "::group::Deploy $svc ($config)"
            fly deploy -c "$config" --wait-timeout 300
            echo "::endgroup::"
          }

          if [ "$SERVICE" = "all" ]; then
            echo "Deploying all services in dependency order..."
            # Phase A: Partitions (independent services)
            deploy_one partition-asia-fast
            deploy_one partition-high-value
            deploy_one partition-l2-fast
            deploy_one partition-solana
            # Phase B: Dependent services
            deploy_one cross-chain-detector
            deploy_one execution-engine
            deploy_one coordinator
          else
            deploy_one "$SERVICE"
          fi

      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Initiated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ github.event.inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Phase 3: Post-Deploy Health Check
  # ===========================================================================
  post-deploy-health:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]
    if: github.event.inputs.dry_run == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify deployed services are healthy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail

          SERVICE="${{ github.event.inputs.service }}"
          CONFIG_DIR="infrastructure/fly"

          config_for_service() {
            case "$1" in
              coordinator)          echo "$CONFIG_DIR/coordinator.toml" ;;
              partition-asia-fast)  echo "$CONFIG_DIR/partition-asia-fast.toml" ;;
              partition-high-value) echo "$CONFIG_DIR/partition-high-value.toml" ;;
              partition-l2-fast)    echo "$CONFIG_DIR/partition-l2-turbo.toml" ;;
              partition-solana)     echo "$CONFIG_DIR/partition-solana.toml" ;;
              execution-engine)     echo "$CONFIG_DIR/execution-engine.toml" ;;
              cross-chain-detector) echo "$CONFIG_DIR/cross-chain-detector.toml" ;;
              *) echo "::error::Unknown service: $1"; exit 1 ;;
            esac
          }

          check_health() {
            local svc="$1"
            local config
            config="$(config_for_service "$svc")"
            local app_name
            app_name="$(grep '^app = ' "$config" | sed 's/app = "//;s/"//')"
            echo "Checking health for $svc ($app_name)..."

            local attempts=0
            local max_attempts=10
            while [ "$attempts" -lt "$max_attempts" ]; do
              attempts=$((attempts + 1))
              echo "  Attempt $attempts/$max_attempts..."
              if fly status -c "$config" --json 2>/dev/null \
                | jq -e '.Machines[] | select(.state == "started")' > /dev/null 2>&1; then
                echo "  $svc is healthy"
                return 0
              fi
              if [ "$attempts" -lt "$max_attempts" ]; then
                sleep 15
              fi
            done

            echo "::error::$svc failed health check after $max_attempts attempts"
            return 1
          }

          if [ "$SERVICE" = "all" ]; then
            for svc in partition-asia-fast partition-high-value partition-l2-fast partition-solana \
                       cross-chain-detector execution-engine coordinator; do
              check_health "$svc"
            done
          else
            check_health "$SERVICE"
          fi

      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ github.event.inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Phase 4: Automated Rollback on Health Check Failure
  # ===========================================================================
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [post-deploy-health]
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Rollback deployed services
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -uo pipefail  # no -e: continue rolling back even if one fails

          SERVICE="${{ github.event.inputs.service }}"
          CONFIG_DIR="infrastructure/fly"

          config_for_service() {
            case "$1" in
              coordinator)          echo "$CONFIG_DIR/coordinator.toml" ;;
              partition-asia-fast)  echo "$CONFIG_DIR/partition-asia-fast.toml" ;;
              partition-high-value) echo "$CONFIG_DIR/partition-high-value.toml" ;;
              partition-l2-fast)    echo "$CONFIG_DIR/partition-l2-turbo.toml" ;;
              partition-solana)     echo "$CONFIG_DIR/partition-solana.toml" ;;
              execution-engine)     echo "$CONFIG_DIR/execution-engine.toml" ;;
              cross-chain-detector) echo "$CONFIG_DIR/cross-chain-detector.toml" ;;
              *) echo "::error::Unknown service: $1"; return 1 ;;
            esac
          }

          rollback_one() {
            local svc="$1"
            local config
            config="$(config_for_service "$svc")"
            echo "::group::Rollback $svc"
            # Get previous release image and redeploy it
            local prev_image
            prev_image=$(fly releases list -c "$config" --json 2>/dev/null \
              | jq -r '.[1].ImageRef // empty' 2>/dev/null || true)
            if [ -n "$prev_image" ]; then
              echo "Redeploying previous image: $prev_image"
              fly deploy -c "$config" --image "$prev_image" --wait-timeout 300 \
                || echo "::warning::Automated rollback failed for $svc"
            else
              echo "::warning::No previous release found for $svc — manual rollback required"
            fi
            echo "::endgroup::"
          }

          echo "::error::Post-deploy health check failed! Initiating rollback..."

          if [ "$SERVICE" = "all" ]; then
            # Rollback in reverse deploy order
            for svc in coordinator execution-engine cross-chain-detector \
                       partition-solana partition-l2-fast partition-high-value partition-asia-fast; do
              rollback_one "$svc"
            done
          else
            rollback_one "$SERVICE"
          fi

      - name: Rollback summary
        if: always()
        run: |
          echo "## ROLLBACK TRIGGERED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Post-deploy health checks failed for **${{ github.event.inputs.service }}**." >> $GITHUB_STEP_SUMMARY
          echo "Automated rollback attempted — check logs above for results." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### If automated rollback failed:" >> $GITHUB_STEP_SUMMARY
          echo "1. Check the failed health check and rollback logs above" >> $GITHUB_STEP_SUMMARY
          echo "2. Run \`fly releases list -c infrastructure/fly/<service>.toml\` to find previous release" >> $GITHUB_STEP_SUMMARY
          echo "3. Redeploy: \`fly deploy -c infrastructure/fly/<service>.toml --image <previous-image>\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify: \`fly status -c infrastructure/fly/<service>.toml\`" >> $GITHUB_STEP_SUMMARY
